services:
  mysql:
    image: mysql:8.4.10
    container_name: site-guard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-site-guard}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    ports:
      - "13306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  site-guard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sunmh207/site-guard:0.2.2
    container_name: site-guard
    ports:
      - "1080:80"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: mysql
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped